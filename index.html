    const createIcon = (iconName) => {
      return ({ size = 24, className = '', ...props }) => {
        const ref = useRef(null);
        useEffect(() => {
          if (ref.current && window.lucide) {
            ref.current.innerHTML = '';
            const svg = window.lucide.icons[iconName] ? window.lucide.icons[iconName].toSvg({ width: size, height: size, class: className }) : '';
            ref.current.innerHTML = svg;
          }
        }, [size, className]);
        return React.createElement('span', { ref, style: { display: 'inline-block', verticalAlign: 'middle', ...props.style } });
      };
    };

  if (items.ac?.status === 'חסר') works.push(2);
  // 3. מערכת FM
  if (items.fmSystem?.status === 'חסר') works.push(3);
  // 4. חלונות פנימיים
  if (items.innerWindows?.status === 'חסר') works.push(4);
  // 5. דלת
  if (items.door?.status === 'חסר') works.push(5);

  if (items.outerWindows?.status === 'חסר') works.push(8);
  // 9. פעמון מהבהב - תמיד תקין, לא מופיע
  return works;
};

// ===== הוק למד דציבלים =====
const useDecibelMeter = () => {
  const [isRecording, setIsRecording] = useState(false);
  const [currentDb, setCurrentDb] = useState(null);
  const [maxDb, setMaxDb] = useState(null);
  const [avgDb, setAvgDb] = useState(null);
  const [error, setError] = useState(null);
  const audioContextRef = useRef(null);
  const analyserRef = useRef(null);
  const streamRef = useRef(null);
  const animationRef = useRef(null);
  const samplesRef = useRef([]);

  const start = async () => {
    try {
      setError(null);
      samplesRef.current = [];
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
      });
      streamRef.current = stream;
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      audioContextRef.current = ctx;
      const source = ctx.createMediaStreamSource(stream);
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      source.connect(analyser);
      analyserRef.current = analyser;

      const dataArray = new Float32Array(analyser.fftSize);
      const tick = () => {
        if (!analyserRef.current) return;
        analyser.getFloatTimeDomainData(dataArray);
        let sumSq = 0;
        for (let i = 0; i < dataArray.length; i++) {
          sumSq += dataArray[i] * dataArray[i];
        }
        const rms = Math.sqrt(sumSq / dataArray.length);
        // המרה ל-dB עם קליברציה משוערת
        const db = rms > 0 ? Math.round(20 * Math.log10(rms) + 94) : 0;
        const clamped = Math.max(20, Math.min(120, db));
        setCurrentDb(clamped);
        samplesRef.current.push(clamped);
        if (samplesRef.current.length > 200) samplesRef.current.shift();
        setMaxDb(Math.max(...samplesRef.current));
        const sum = samplesRef.current.reduce((a, b) => a + b, 0);
        setAvgDb(Math.round(sum / samplesRef.current.length));
        animationRef.current = requestAnimationFrame(tick);
      };
      tick();
      setIsRecording(true);
    } catch (e) {
      setError(e.message || 'שגיאה בגישה למיקרופון');
    }
  };

  const stop = () => {
    if (animationRef.current) cancelAnimationFrame(animationRef.current);
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    if (audioContextRef.current) audioContextRef.current.close();
    audioContextRef.current = null;
    analyserRef.current = null;
    streamRef.current = null;
    animationRef.current = null;
    setIsRecording(false);
  };

  useEffect(() => () => stop(), []);

  return { isRecording, currentDb, maxDb, avgDb, error, start, stop };
};

          }`}
        >
          ✓ עומד בתקן
        </button>
        <button
          onClick={() => onChange('לא עומד בתקן')}

      </div>
      <button

          <span className="font-bold">| נמדד: {measured} dB</span>

function DecibelMeter({ onSave }) {
  const meter = useDecibelMeter();
  const [manualValue, setManualValue] = useState('');
  
  return (
    <div className="mt-3 p-4 bg-stone-900 text-white rounded-xl">
      <div className="text-center mb-3">
        <div className="text-5xl font-bold tabular-nums">
          {meter.currentDb !== null ? meter.currentDb : '--'}
          <span className="text-xl text-stone-400 mr-1">dB</span>
        </div>
        {meter.isRecording && (
          <div className="flex justify-center gap-4 text-xs text-stone-400 mt-2">
            <span>ממוצע: <span className="text-white font-semibold">{meter.avgDb ?? '--'}</span></span>
            <span>מקס: <span className="text-white font-semibold">{meter.maxDb ?? '--'}</span></span>
          </div>
        )}
        {meter.error && (
          <div className="mt-2 p-2 bg-rose-900/40 border border-rose-700 rounded-lg text-rose-200 text-xs">
            <div className="flex items-center gap-1 font-semibold mb-1">
              <AlertCircle size={14} /> שגיאה במיקרופון
            </div>
            <p className="text-right">{meter.error}</p>
            <p className="text-right mt-1 text-rose-300">
              💡 בדפדפן: ודא שאישרת גישה למיקרופון ✓
              <br />
              💡 ב-iPhone: הגדרות {'>'} Safari {'>'} מיקרופון
              <br />
              💡 בכל מקרה: ניתן להזין ערך ידני למטה
            </p>
          </div>
        )}
        <p className="text-[10px] text-stone-500 mt-2">
          ⚠️ כלי עזר בלבד. למדידה רשמית השתמש במד מקצועי מכויל.
        </p>
      </div>
      <div className="flex gap-2 mb-3">
        {!meter.isRecording ? (
          <button onClick={meter.start} className="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-700 rounded-lg font-medium transition flex items-center justify-center gap-1">
            <Mic size={16} /> התחל מדידה
          </button>
        ) : (
          <button onClick={meter.stop} className="flex-1 py-2.5 bg-rose-600 hover:bg-rose-700 rounded-lg font-medium transition flex items-center justify-center gap-1">
            <MicOff size={16} /> עצור
          </button>
        )}
        {meter.avgDb !== null && !meter.isRecording && (
          <button onClick={() => onSave(meter.avgDb)} className="px-4 py-2.5 bg-amber-600 hover:bg-amber-700 rounded-lg font-medium transition flex items-center gap-1">
            <Save size={16} /> שמור ממוצע
          </button>
        )}
      </div>
      {/* הזנה ידנית */}
      <div className="border-t border-stone-700 pt-3">
        <div className="text-xs text-stone-400 mb-2">או הזן ערך ידנית (ממד מקצועי):</div>
        <div className="flex gap-2">
          <input
            type="number"
            value={manualValue}
            onChange={e => setManualValue(e.target.value)}
            placeholder="dB"
            className="flex-1 px-3 py-2 rounded-lg bg-stone-800 border border-stone-600 text-white placeholder-stone-500 outline-none focus:border-amber-600"
          />
          <button
            onClick={() => {
              if (manualValue) onSave(parseInt(manualValue));
            }}
            disabled={!manualValue}
            className="px-4 py-2 bg-amber-600 hover:bg-amber-700 disabled:opacity-40 disabled:cursor-not-allowed rounded-lg font-medium transition"
          >
            שמור
          </button>
        </div>
      </div>
    </div>
  );
}

function PhotoSlot({ label, value, onChange }) {
  const inputRef = useRef(null);
  const handleFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => onChange(reader.result);
    reader.readAsDataURL(file);
  };
  return (
    <div className="bg-stone-50 rounded-xl p-3 border border-stone-200">
      <div className="font-medium text-stone-800 mb-2">{label}</div>
      {value ? (
        <div className="relative">
          <img src={value} alt={label} className="w-full h-48 object-cover rounded-lg" />
          <button
            onClick={() => onChange(null)}
            className="absolute top-2 left-2 bg-rose-600 hover:bg-rose-700 text-white p-2 rounded-lg shadow-lg transition"
            title="הסר תמונה"
          >
            <Trash2 size={16} />
          </button>
        </div>
      ) : (
        <button
          onClick={() => inputRef.current?.click()}
          className="w-full h-32 rounded-lg border-2 border-dashed border-stone-300 hover:border-amber-700 hover:bg-amber-50 transition flex flex-col items-center justify-center gap-2 text-stone-500 hover:text-amber-700"
        >
          <Camera size={28} />
          <span className="text-sm">צלם / בחר תמונה</span>
        </button>
      )}
      <input
        ref={inputRef}
        type="file"
        accept="image/*"
        capture="environment"
        onChange={handleFile}
        className="hidden"
      />
    </div>
  );
}

// ===== שורת מדידת dB עם מד פנימי + צילום מסך =====
function ClosureDbRow({ title, threshold, measurement, update }) {
  const [showMeter, setShowMeter] = useState(false);
  const meterContainerRef = useRef(null);
  const meter = useDecibelMeter();

  const captureMeterAsPhoto = async () => {
    if (!meterContainerRef.current) return;
    
    // יצירת תמונה דרך SVG ו-canvas
    const node = meterContainerRef.current;
    const rect = node.getBoundingClientRect();
    const canvas = document.createElement('canvas');
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    
    // רקע שחור
    ctx.fillStyle = '#1c1917';
    ctx.fillRect(0, 0, rect.width, rect.height);
    
    // טקסט
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 48px Rubik, sans-serif';
    
    const dbValue = meter.avgDb !== null ? meter.avgDb : (meter.currentDb || 0);
    const isPass = dbValue <= threshold;
    
    // הערך הראשי
    ctx.fillStyle = isPass ? '#10b981' : '#ef4444';
    ctx.font = 'bold 80px Rubik, sans-serif';
    ctx.fillText(`${dbValue}`, rect.width / 2, rect.height / 2 - 10);
    
    // dB
    ctx.fillStyle = '#a8a29e';
    ctx.font = '28px Rubik, sans-serif';
    ctx.fillText('dB', rect.width / 2, rect.height / 2 + 30);
    
    // סטטוס
    ctx.fillStyle = isPass ? '#10b981' : '#ef4444';
    ctx.font = 'bold 24px Rubik, sans-serif';
    ctx.fillText(isPass ? '✓ עומד בתקן' : '✗ לא עומד בתקן', rect.width / 2, rect.height / 2 + 70);
    
    // כותרת
    ctx.fillStyle = '#fbbf24';
    ctx.font = '16px Rubik, sans-serif';
    ctx.fillText(title, rect.width / 2, 30);
    
    // ערך הסף
    ctx.fillStyle = '#a8a29e';
    ctx.font = '14px Rubik, sans-serif';
    ctx.fillText(`ערך סף: ${threshold} dB`, rect.width / 2, rect.height - 20);
    
    const dataUrl = canvas.toDataURL('image/png');
    
    update('measuredDb', dbValue);
    update('photo', dataUrl);
    update('status', isPass ? 'עומד בתקן' : 'לא עומד בתקן');
    
    meter.stop();
    setShowMeter(false);
  };

  const dbValue = meter.currentDb !== null ? meter.currentDb : null;
  const isPass = dbValue !== null ? dbValue <= threshold : null;

  return (
    <div className="bg-stone-50 rounded-xl p-4 border border-stone-200">
      <div className="font-medium text-stone-800 mb-3">{title}</div>
      
      {/* תוצאה שמורה */}
      {measurement.measuredDb !== null && !showMeter && (
        <div className="mb-3 p-3 rounded-lg border border-stone-300 bg-white">
          <div className="flex items-center justify-between">
            <div>
              <div className="text-2xl font-bold tabular-nums">
                {measurement.measuredDb} <span className="text-sm text-stone-500">dB</span>
              </div>
              <div className={`text-sm font-semibold ${
                measurement.status === 'עומד בתקן' ? 'text-emerald-700' : 'text-rose-700'
              }`}>
                {measurement.status === 'עומד בתקן' ? '✓ עומד בתקן' : '✗ לא עומד בתקן'}
              </div>
            </div>
            {measurement.photo && (
              <img src={measurement.photo} alt="מד דציבלים" className="h-20 rounded border border-stone-300" />
            )}
          </div>
          <button
            onClick={() => {
              update('measuredDb', null);
              update('photo', null);
              update('status', '');
              setShowMeter(true);
            }}
            className="mt-2 text-sm text-amber-700 hover:text-amber-900"
          >
            🔄 מדוד מחדש
          </button>
        </div>
      )}

      {/* כפתור התחלה */}
      {measurement.measuredDb === null && !showMeter && (
        <button
          onClick={() => setShowMeter(true)}
          className="w-full py-3 rounded-lg bg-emerald-700 text-white font-medium hover:bg-emerald-800 transition flex items-center justify-center gap-2"
        >
          <Mic size={18} /> התחל מדידה
        </button>
      )}

      {/* מד דציבלים פעיל */}
      {showMeter && (
        <div className="space-y-3">
          <div ref={meterContainerRef} className="bg-stone-900 rounded-xl p-6 text-white text-center" style={{ minHeight: '180px' }}>
            <div className="text-amber-400 text-xs mb-3">{title}</div>
            <div className="text-7xl font-bold tabular-nums" style={{
              color: isPass === null ? '#ffffff' : (isPass ? '#10b981' : '#ef4444')
            }}>
              {dbValue !== null ? dbValue : '--'}
            </div>
            <div className="text-stone-400 text-sm mt-1">dB</div>
            {isPass !== null && (
              <div className={`mt-2 text-sm font-bold ${isPass ? 'text-emerald-400' : 'text-rose-400'}`}>
                {isPass ? '✓ עומד בתקן' : '✗ לא עומד בתקן'}
              </div>
            )}
            <div className="text-stone-500 text-xs mt-3">ערך סף: {threshold} dB</div>
          </div>

          {meter.error && (
            <div className="bg-rose-50 border border-rose-200 text-rose-700 rounded-lg p-2 text-xs">
              <AlertCircle size={14} className="inline ml-1" /> {meter.error}
            </div>
          )}

          <div className="flex gap-2">
            {!meter.isRecording ? (
              <button onClick={meter.start} className="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-medium flex items-center justify-center gap-1">
                <Mic size={16} /> התחל
              </button>
            ) : (
              <button onClick={meter.stop} className="flex-1 py-2.5 bg-rose-600 hover:bg-rose-700 text-white rounded-lg font-medium flex items-center justify-center gap-1">
                <MicOff size={16} /> עצור
              </button>
            )}
            {dbValue !== null && !meter.isRecording && (
              <button onClick={captureMeterAsPhoto} className="px-4 py-2.5 bg-amber-600 hover:bg-amber-700 text-white rounded-lg font-medium flex items-center gap-1">
                <Save size={16} /> שמור
              </button>
            )}
            <button
              onClick={() => { meter.stop(); setShowMeter(false); }}
              className="px-3 py-2.5 bg-stone-200 hover:bg-stone-300 text-stone-700 rounded-lg"
            >
              <X size={16} />
            </button>
          </div>

          {/* הזנה ידנית */}
          <details className="text-sm">
            <summary className="cursor-pointer text-stone-600 hover:text-stone-800">או הזן ערך ידנית →</summary>
            <ManualDbEntry threshold={threshold} title={title} onSave={(db, photo, status) => {
              update('measuredDb', db);
              update('photo', photo);
              update('status', status);
              setShowMeter(false);
            }} />
          </details>
        </div>
      )}
    </div>
  );
}

// ===== הזנה ידנית של ערך dB =====
function ManualDbEntry({ threshold, title, onSave }) {
  const [value, setValue] = useState('');
  const handleSave = () => {
    const db = parseInt(value);
    if (isNaN(db)) return;
    const isPass = db <= threshold;
    
    // יצירת "תמונה" של מד דציבלים
    const canvas = document.createElement('canvas');
    canvas.width = 600;
    canvas.height = 360;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#1c1917';
    ctx.fillRect(0, 0, 600, 360);
    
    ctx.fillStyle = '#fbbf24';
    ctx.textAlign = 'center';
    ctx.font = '20px Rubik, sans-serif';
    ctx.fillText(title, 300, 40);
    
    ctx.fillStyle = isPass ? '#10b981' : '#ef4444';
    ctx.font = 'bold 130px Rubik, sans-serif';
    ctx.fillText(`${db}`, 300, 200);
    
    ctx.fillStyle = '#a8a29e';
    ctx.font = '32px Rubik, sans-serif';
    ctx.fillText('dB', 300, 240);
    
    ctx.fillStyle = isPass ? '#10b981' : '#ef4444';
    ctx.font = 'bold 28px Rubik, sans-serif';
    ctx.fillText(isPass ? '✓ עומד בתקן' : '✗ לא עומד בתקן', 300, 290);
    
    ctx.fillStyle = '#a8a29e';
    ctx.font = '16px Rubik, sans-serif';
    ctx.fillText(`ערך סף: ${threshold} dB`, 300, 330);
    
    const dataUrl = canvas.toDataURL('image/png');
    onSave(db, dataUrl, isPass ? 'עומד בתקן' : 'לא עומד בתקן');
  };
  return (
    <div className="mt-2 flex gap-2">
      <input
        type="number"
        value={value}
        onChange={e => setValue(e.target.value)}
        placeholder="dB"
        className="flex-1 px-3 py-2 rounded-lg border border-stone-300 outline-none focus:border-amber-700"
      />
      <button onClick={handleSave} disabled={!value}
        className="px-4 py-2 bg-amber-600 hover:bg-amber-700 disabled:opacity-40 text-white rounded-lg">
        שמור
      </button>
    </div>
  );
}
